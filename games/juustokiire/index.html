<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>JUUSTOKIIRE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
    }
    
    body {
      background: #1a1a00;
      color: #fff;
      font-family: 'VT323', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      margin: 0;
    }
    
    #game-ui {
      position: absolute;
      top: 20px;
      font-size: 2rem;
      color: #ffcc00;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
    }
    
    #gameCanvas {
      background: #222;
      border: 4px solid #ffcc00;
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
      cursor: crosshair;
    }
    
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      z-index: 10;
    }
    
    h1 {
      font-size: 3rem;
      color: #ffcc00;
      text-shadow: 2px 2px 0 #000;
    }
    
    p {
      font-size: 1.5rem;
      color: #ccc;
    }
    
    .btn {
      background: #ffcc00;
      color: #000;
      border: none;
      padding: 15px 30px;
      font-family: inherit;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.1s;
    }
    
    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div id="game-ui">PISTEET: <span id="score">0</span></div>
  
  <canvas id="gameCanvas" width="320" height="480"></canvas>
  
  <div id="start-screen" class="screen">
    <h1>JUUSTOKIIRE</h1>
    <p>Nappaa kaikki juustot <br> ennen kuin ne katoavat!</p>
    <button class="btn" onclick="startGame()">ALOITA</button>
  </div>
  
  <div id="game-over-screen" class="screen" style="display:none">
    <h1>GAME OVER</h1>
    <p>Sait <span id="final-score">0</span> juustoa!</p>
    <button class="btn" onclick="restartGame()">UUDESTAAN</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('final-score');
    
    let score = 0;
    let gameActive = false;
    let cheeses = [];
    let spawnRate = 1000;
    let lastSpawn = 0;
    let timer = 30; // 30 seconds game
    let gameInterval;

    class Cheese {
      constructor() {
        this.x = Math.random() * (canvas.width - 40);
        this.y = Math.random() * (canvas.height - 40);
        this.size = 30 + Math.random() * 20;
        this.life = 2000 + Math.random() * 1000;
        this.maxLife = this.life;
        this.color = '#ffcc00';
      }

      update(dt) {
        this.life -= dt;
        return this.life > 0;
      }

      draw() {
        const alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha;
        
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, 0, Math.PI * 2);
        ctx.fill();
        
        // Reikät
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x + this.size/4, this.y + this.size/4, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x + this.size/2, this.y + this.size/2 + 2, 3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.globalAlpha = 1.0;
      }
    }

    function spawnCheese() {
      cheeses.push(new Cheese());
    }

    function startGame() {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('game-over-screen').style.display = 'none';
      score = 0;
      scoreEl.textContent = score;
      cheeses = [];
      gameActive = true;
      timer = 30;
      
      gameInterval = setInterval(() => {
        timer--;
        if (timer <= 0) endGame();
      }, 1000);
      
      requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameActive = false;
      clearInterval(gameInterval);
      document.getElementById('game-over-screen').style.display = 'flex';
      finalScoreEl.textContent = score;
    }

    function restartGame() {
      startGame();
    }

    function gameLoop(timestamp) {
      if (!gameActive) return;

      const now = Date.now();
      const dt = 16.67; // fixed update approx

      if (now - lastSpawn > spawnRate) {
        spawnCheese();
        lastSpawn = now;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      cheeses = cheeses.filter(c => {
        if (c.update(dt)) {
          c.draw();
          return true;
        }
        return false;
      });

      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      cheeses = cheeses.filter(c => {
        const dx = x - (c.x + c.size/2);
        const dy = y - (c.y + c.size/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < c.size/2) {
          score++;
          scoreEl.textContent = score;
          return false;
        }
        return true;
      });
    });

    let lastSpawn = 0;
  </script>
</body>
</html>
