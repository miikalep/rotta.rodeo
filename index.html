<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MINIPELIKARUSELLI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
    }
    
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'VT323', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }
    
    h1 {
      font-size: 3rem;
      letter-spacing: 8px;
      color: #ffcc00;
      text-shadow: 0 0 10px #ffcc0066;
      margin-bottom: 30px;
    }
    
    #carousel {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 800px;
      height: 400px;
      transition: transform 0.5s ease-in-out;
    }
    
    .game-card {
      background: #1a1a1a;
      border: 3px solid #333;
      padding: 20px;
      width: 200px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    
    .game-card:hover {
      border-color: #ffcc00;
      transform: translateY(-10px);
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
    }
    
    .game-card img {
      width: 100px;
      height: 100px;
      background: #333;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    
    .game-card h2 {
      font-size: 1.5rem;
      color: #ffcc00;
    }
    
    .game-card p {
      font-size: 1.1rem;
      color: #888;
    }
    
    #game-container {
      display: none;
      position: relative;
      width: 100%;
      max-width: 600px;
      flex-direction: column;
      align-items: center;
    }
    
    .back-btn {
      position: absolute;
      top: -50px;
      left: 0;
      background: #ffcc00;
      color: #0a0a0a;
      border: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 4px;
      z-index: 100;
    }
    
    iframe {
      border: 4px solid #333;
      background: #000;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="main-menu">
    <h1>PELIVALikko</div>
    <div id="carousel">
      <!-- Games injected here -->
    </div>
  </div>

  <div id="game-container">
    <button class="back-btn" onclick="returnToMenu()">← TAKAISIN</button>
    <iframe id="game-iframe" src="" width="360" height="500"></iframe>
  </div>

  <script>
    const games = [
      {
        id: 'mitatonrotta',
        name: 'MITATON ROTTA',
        desc: 'Välitä valokeiloja!',
        emoji: '🐀',
        url: 'games/mitatonrotta/index.html'
      },
      {
        id: 'rotta-rodeo',
        name: 'ROTTA.RODEO',
        desc: 'Klassinen mätö-rotta',
        emoji: '🐀',
        url: 'rotta.rodeo/index.html'
      },
      {
        id: 'juustokiire',
        name: 'JUUSTOKIREE',
        desc: 'Kerää juustoja nopeasti!',
        emoji: '🧀',
        url: 'juustokiire/index.html'
      },
      {
        id: 'rotankymmenen',
        name: 'ROTAN KYMMENEN',
        desc: 'Tapa 10 rottaa ajastuksella!',
        emoji: '🐀',
        url: 'games/rotankymmenen/index.html'
      },
      {
        id: 'juustonvartija',
        name: 'JUUSTON VARTIJA',
        desc: 'Vartio juustoa rotilta!',
        emoji: '🐀',
        url: 'games/juustonvartija/index.html'
      }
    ];

    function initCarousel() {
      const carousel = document.getElementById('carousel');
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.onclick = () => launchGame(game.url);
        card.innerHTML = `
          <div class="game-card-icon" style="font-size:3rem">${game.emoji}</div>
          <h2>${game.name}</h2>
          <p>${game.desc}</p>
        `;
        carousel.appendChild(card);
      });
    }

    function launchGame(url) {
      document.getElementById('main-menu').style.display = 'none';
      document.getElementById('game-container').style.display = 'flex';
      document.getElementById('game-iframe').src = url;
    }

    function returnToMenu() {
      document.getElementById('main-menu').style.display = 'block';
      document.getElementById('game-container').style.display = 'none';
      document.getElementById('game-iframe').src = '';
    }

    initCarousel();
  </script>
</body>
</html>
